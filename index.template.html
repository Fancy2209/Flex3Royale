<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>OpenFL and Adobe Flex 3 Application</title>
    <script src="openfl.min.js"></script>
    <script src="https://unpkg.com/actuate@1.9.0/dist/actuate.min.js"></script>
    <script>
        var flash = openfl;
    </script>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
    </style>
    ${head}
</head>

<body>
    <script>
        Flex3Royale_mx_managers_SystemManager.prototype.info = function() {
            return  {  
                mainClassName: "Flex3Royale",
                usePreloader: false,
                compiledLocales: ["en_US"],
                mixins: [ /*"_HelloFlex_FlexInit", "_HelloFlex_Styles", "mx.styles.StyleManagerImpl"*/ ]
            }
        };
        var stage = new openfl.display.Stage(320, 240, null, Flex3Royale_mx_managers_SystemManager);
        document.body.appendChild(stage.element);
    </script>
</body>

</html>
